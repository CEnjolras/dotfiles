---
- name: Main playbook using include_tasks
  hosts: localhost
  become: yes
  tasks:
    - name: Ensure git is installed
      pacman:
        name: git
        state: present

    - name: Create a directory for the playbooks
      file:
        path: "/tmp"
        state: directory

    - name: Clone dotfiles repository
      git:
        repo: 'https://github.com/CEnjolras/dotfiles.git'
        dest: '/tmp'
        depth: 1
        force: yes

    - name: Include pacman_reflector tasks
      include_tasks: '/tmp/playbooks/pacman_reflector.yml'

    - name: Include yay tasks
      include_tasks: '/tmp/playbooks/yay.yml'

    - name: Include terminal_fish_foot tasks
      include_tasks: '/tmp/playbooks/terminal_fish_foot.yml'

    - name: Include nvm tasks
      include_tasks: '/tmp/playbooks/nvm.yml'

    - name: Include hyprland tasks
      include_tasks: '/tmp/playbooks/hyprland.yml'

    - name: Cleanup - Remove the dotfiles_playbooks directory
      file:
        path: "/tmp"
        state: absent
